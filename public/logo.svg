<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#191C22" />
      <stop offset="100%" stop-color="#000000" />
    </radialGradient>
    <linearGradient id="topGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F7F7F8" />
      <stop offset="100%" stop-color="#D8D8DD" />
    </linearGradient>
    <linearGradient id="leftGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B2B2BA" />
      <stop offset="100%" stop-color="#8F8F97" />
    </linearGradient>
    <linearGradient id="rightGrad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#62626D" />
      <stop offset="100%" stop-color="#44424C" />
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.35" />
    </filter>
  </defs>

  <rect width="200" height="200" rx="40" fill="url(#bg)" />

  <g transform="translate(0, 5)" filter="url(#softShadow)">
    <polygon points="100,45 145,68 100,91 55,68" fill="url(#topGrad)" stroke="rgba(255,255,255,0.16)" stroke-width="1" />
    <line x1="100" y1="45" x2="100" y2="91" stroke="#0A0A0A" stroke-width="2" stroke-linecap="round" />

    <g fill="url(#leftGrad)">
      <polygon points="55,68 100,91 100,123 75,103" />
      <polygon points="75,103 100,123 100,155 55,132" />
    </g>

    <g fill="url(#rightGrad)">
      <polygon points="145,68 100,91 100,123 125,103" />
      <polygon points="125,103 100,123 100,155 145,132" />
    </g>

    <path d="M100,91 L100,155 M55,68 L100,91 L145,68" stroke="#000000" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" fill="none" />

    <g opacity="0.9">
      <circle cx="95" cy="112" r="2.5" fill="#81818C" />
      <circle cx="95" cy="124" r="2.5" fill="#81818C" />
    </g>

    <path d="M100,45 L140,68 M100,45 L60,68" stroke="rgba(255,255,255,0.28)" stroke-width="1.5" stroke-linecap="round" />
